name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require a commit from main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify the release tag
        run: node scripts/verify-release.mjs "$GITHUB_REF_NAME"

      - name: Test the package
        run: npm test

      - name: Inspect the package contents
        run: npm pack --dry-run

      - name: Check whether this version is already published
        id: npm-version
        shell: bash
        run: |
          package_name=$(node -p 'require("./package.json").name')
          package_version=$(node -p 'require("./package.json").version')
          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-version.outputs.published != 'true'
        run: npm publish --access public

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
